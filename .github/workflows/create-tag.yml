name: Create Release Tag

on:
  push:
    branches:
      - "release/v*"

permissions:
  contents: write

jobs:
  create-tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/release/}"
          echo "tag=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${BRANCH_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Build release notes from changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.tag }}"

          CHANGELOG_SECTION="$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md)"

          if [ -z "${CHANGELOG_SECTION}" ]; then
            CHANGELOG_SECTION="- No changelog entry found for ${VERSION}."
          fi

          PREV_TAG="$(git tag --sort=-v:refname | grep '^v' | grep -vx "${TAG_NAME}" | head -n 1 || true)"

          {
            echo "## What's Changed"
            echo
            echo "${CHANGELOG_SECTION}"
            echo
            if [ -n "${PREV_TAG}" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME}"
            fi
          } > release_notes.md

      - name: Determine release channel
        id: release_channel
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.version.outputs.tag }}"

          if echo "${TAG_NAME}" | grep -qi "beta"; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          make_latest: ${{ steps.release_channel.outputs.make_latest }}

      - name: Clean up release branch
        run: |
          git push origin --delete "${GITHUB_REF#refs/heads/}" || true
